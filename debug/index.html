<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>password-checker debug</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 900px; margin: 24px auto; padding: 0 16px; }
    input { width: 100%; padding: 10px; font-size: 16px; }
    pre { background: #111; color: #d7ffd7; padding: 12px; border-radius: 8px; overflow: auto; }
    .row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    code { background:#eee; padding:2px 4px; border-radius:4px; }
  </style>
</head>
<body>
  <h1>🧪 password-checker debug</h1>
  <p>Local debug UI for multilingual bloom + analyzer.</p>

  <div class="row">
    <label><input type="checkbox" id="lang-fi" checked /> fi</label>
    <label><input type="checkbox" id="lang-en" checked /> en</label>
    <label><input type="checkbox" id="hibp-enabled" /> HIBP</label>
  </div>

  <p><input id="pw" placeholder="Try e.g. passwordaurinko or lintulentää" /></p>

  <h3>Analyze result</h3>
  <p><strong>Label:</strong> <span id="label"></span> · <strong>Score:</strong> <span id="score"></span></p>
  <pre id="result"></pre>

  <h3>Matched words/parts</h3>
  <pre id="matches"></pre>

  <h3>HIBP result</h3>
  <pre id="hibp"></pre>

  <h3>Bloom quick checks</h3>
  <pre id="checks"></pre>

  <p>Run locally with: <code>npm run debug</code> then open this page.</p>

  <script type="module">
    import { PasswordDefenseCore } from '../src/index.js';

    const bloom = await fetch('../fixtures/blooms.generated.json').then(r => r.json());
    const core = new PasswordDefenseCore({
      defaultLanguage: bloom.defaultLanguage,
      languages: bloom.languages,
      activeLanguages: ['fi','en']
    });

    const pwEl = document.getElementById('pw');
    const resultEl = document.getElementById('result');
    const scoreEl = document.getElementById('score');
    const labelEl = document.getElementById('label');
    const checksEl = document.getElementById('checks');
    const matchesEl = document.getElementById('matches');
    const hibpEl = document.getElementById('hibp');
    const fiEl = document.getElementById('lang-fi');
    const enEl = document.getElementById('lang-en');
    const hibpToggle = document.getElementById('hibp-enabled');

    function selectedLangs() {
      const langs = [];
      if (fiEl.checked) langs.push('fi');
      if (enEl.checked) langs.push('en');
      return langs.length ? langs : [bloom.defaultLanguage || 'en'];
    }

    async function render() {
      const pw = pwEl.value || '';
      const langs = selectedLangs();
      core.setActiveLanguages(langs);

      const hibpEnabled = !!hibpToggle.checked;
      let r;
      if (hibpEnabled) {
        try {
          r = await core.analyzeAsync(pw, { languages: langs, hibp: { enabled: true } });
        } catch (err) {
          r = core.analyze(pw, { languages: langs });
          r.hibp = { enabled: true, error: String(err) };
        }
      } else {
        r = core.analyze(pw, { languages: langs });
        r.hibp = { enabled: false, pwned: false };
      }

      resultEl.textContent = JSON.stringify(r, null, 2);
      scoreEl.textContent = String(r.score ?? '-');
      labelEl.textContent = `${r.label ?? '-'} (${r.labelKey ?? '-'})`;

      const parts = r.matchedParts || [];
      matchesEl.textContent = parts.length
        ? parts.map((m, i) => `${i + 1}. ${m.part} (start=${m.start}, len=${m.len})`).join('\n')
        : 'No matched parts.';

      hibpEl.textContent = JSON.stringify(r.hibp || { enabled: false }, null, 2);

      const testWords = ['lintu','lentää','password','traffic','qwerty','zzzxxy'];
      const lines = testWords.map(w => `${w}: ${core.checkBloom(w, { languages: langs })}`);
      checksEl.textContent = lines.join('\n');
    }

    pwEl.addEventListener('input', () => { render(); });
    fiEl.addEventListener('change', () => { render(); });
    enEl.addEventListener('change', () => { render(); });
    hibpToggle.addEventListener('change', () => { render(); });
    render();
  </script>
</body>
</html>
