name: Deploy GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build bloom fixtures
        run: |
          npm ci || npm i
          npm run build:bloom

      - name: Prepare static site
        run: |
          mkdir -p _site
          cp -r debug src fixtures _site/
          cp README.md _site/
          cat > _site/index.html <<'HTML'
          <!doctype html>
          <html>
          <head>
            <meta charset="utf-8" />
            <meta http-equiv="refresh" content="0; url=./debug/" />
            <title>password-checker</title>
          </head>
          <body>
            <p>Redirecting to <a href="./debug/">debug demo</a>…</p>
          </body>
          </html>
          HTML

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
